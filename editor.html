/* ---------- Special Characters (LibreOffice-style) ----------
   A subset dropdown + character grid, generated from Unicode block ranges
   (the same organization LibreOffice's Insert > Special Character uses).
   Clicking a character closes the dialog and inserts it at the position
   the cursor last occupied in the document (tracked continuously via
   selectionchange, since opening the dialog moves focus). Insertion goes
   through execCommand so it participates in undo and the dirty flag. */

let lastEditorRange = null;   // last selection seen inside #editor
let charmapBlockIdx = 1;      // remember the chosen subset (default Latin-1)

const CHAR_BLOCKS = [
  ["Basic Latin", 0x0021, 0x007E],
  ["Latin-1 Supplement", 0x00A1, 0x00FF],
  ["Latin Extended-A", 0x0100, 0x017F],
  ["Latin Extended-B", 0x0180, 0x024F],
  ["Greek and Coptic", 0x0386, 0x03FF],
  ["Cyrillic", 0x0400, 0x04FF],
  ["Hebrew", 0x05D0, 0x05EA],
  ["Arabic", 0x0621, 0x064A],
  ["General Punctuation", 0x2010, 0x205E],
  ["Superscripts and Subscripts", 0x2070, 0x209C],
  ["Currency Symbols", 0x20A0, 0x20BF],
  ["Letterlike Symbols", 0x2100, 0x214F],
  ["Number Forms", 0x2150, 0x218B],
  ["Arrows", 0x2190, 0x21FF],
  ["Mathematical Operators", 0x2200, 0x22FF],
  ["Miscellaneous Technical", 0x2300, 0x23FF],
  ["Box Drawing", 0x2500, 0x257F],
  ["Geometric Shapes", 0x25A0, 0x25FF],
  ["Miscellaneous Symbols", 0x2600, 0x26FF],
  ["Dingbats", 0x2700, 0x27BF],
  ["Emoticons", 0x1F600, 0x1F64F],
  ["Symbols and Pictographs", 0x1F300, 0x1F3FF],
];

// Invisible/bidi-control code points that would be confusing to insert
// blind from a picker (zero-width chars, joiners, direction overrides).
function charmapSkip(cp) {
  return (cp >= 0x200B && cp <= 0x200F) ||  // zero-width chars & marks
         (cp >= 0x202A && cp <= 0x202E) ||  // bidi embedding/override controls
         cp === 0x2028 || cp === 0x2029 ||  // line/paragraph separators
         (cp >= 0x2060 && cp <= 0x206F) ||  // invisible operators/joiners
         cp === 0x00AD;                     // soft hyphen
}

function renderCharGrid() {
  const grid = document.getElementById("charmap-grid");
  const [, from, to] = CHAR_BLOCKS[charmapBlockIdx];
  let html = "";
  for (let cp = from; cp <= to; cp++) {
    if (charmapSkip(cp)) continue;
    const ch = String.fromCodePoint(cp);
    const hex = "U+" + cp.toString(16).toUpperCase().padStart(4, "0");
    html += '<button data-c="' + escAttr(ch) + '" data-u="' + hex + '" title="' + hex + '">' +
            escHtml(ch) + "</button>";
  }
  grid.innerHTML = html;
}

function insertSpecialChar(ch) {
  editor.focus();
  if (lastEditorRange) {
    const sel = getSelection();
    sel.removeAllRanges();
    try { sel.addRange(lastEditorRange); }
    catch (e) { /* stale range (document replaced); insert at focus caret */ }
  }
  document.execCommand("insertText", false, ch);
  markDirty();
}

function openCharmap() {
  const options = CHAR_BLOCKS
    .map((b, i) => '<option value="' + i + '"' + (i === charmapBlockIdx ? " selected" : "") + ">" +
                   escHtml(b[0]) + "</option>")
    .join("");
  showModal("Special Characters",
    '<div class="charmap-top">' +
      '<select id="charmap-block">' + options + "</select>" +
      '<span id="charmap-info"></span>' +
    "</div>" +
    '<div id="charmap-grid"></div>');
  const blockSel = document.getElementById("charmap-block");
  const grid = document.getElementById("charmap-grid");
  const info = document.getElementById("charmap-info");
  blockSel.addEventListener("change", () => {
    charmapBlockIdx = parseInt(blockSel.value, 10) || 0;
    renderCharGrid();
  });
  grid.addEventListener("mouseover", (ev) => {
    const b = ev.target.closest("button[data-c]");
    if (b) info.textContent = b.dataset.u + "  " + b.dataset.c;
  });
  grid.addEventListener("click", (ev) => {
    const b = ev.target.closest("button[data-c]");
    if (!b) return;
    const ch = b.dataset.c;
    closeModal();
    insertSpecialChar(ch);
    flash("Inserted " + ch + " (" + b.dataset.u + ")");
  });
  renderCharGrid();
  blockSel.focus();
}

document.getElementById("btn-charmap").addEventListener("click", openCharmap);

/* ---------- Insert: shortcodes & variables (flavor-driven) ----------
   config.toml declares the SSG FLAVOR only ([shortcodes] syntaxes);
   shortcode and variable definitions live in the SSG, never here. The
   Insert dialogs collect the text that goes BETWEEN the brackets and the
   editor supplies the flavor's brackets (first configured flavor drives
   insertion). What is inserted is ordinary text; preservation on save
   comes from the stateless pattern protection in the Go pipeline, which
   equally protects typed, pasted, and pre-existing notation. Keep
   notation on one line and unformatted: bolding half a shortcode splits
   it across nodes and it degrades to escaped text. */

let scSyntaxes = ["hugo"];
(async () => {
  try { scSyntaxes = (await appGetShortcodeSyntaxes()) || ["hugo"]; } catch (e) {}
  // "strict": native GFM only -- no notation layer exists, so the menu
  // must not offer to insert one. (notationDelims falls back to hugo for
  // unknown flavors; without this, Insert > Component under strict would
  // wrap text in brackets the mode itself escapes on save.) Metadata is
  // a separate tenant and stays.
  if (scSyntaxes.includes("strict")) {
    scSyntaxes = ["strict"];   // strict is exclusive; mirror Go normalization
    document.getElementById("insert-shortcode").hidden = true;
    document.getElementById("insert-variable").hidden = true;
    document.getElementById("btn-insert").title = "Insert image, metadata preamble, or note";
  }
})();

function shortcodeRegexList() {
  // Brace-bounded interiors: multi-line notation matches (Hugo permits
  // it), while braces fence any stray opener. Variables stay line-bound.
  const out = [];
  for (const s of scSyntaxes) {
    if (s === "hugo") { out.push(/\{\{<[^{}]*?>\}\}/g, /\{\{%[^{}]*?%\}\}/g, /\{\{[^{}\n]*?\}\}/g); }
    else if (s === "liquid") { out.push(/\{%[^{}]*?%\}/g, /\{\{[^{}\n]*?\}\}/g); }
    else if (s === "params") { out.push(/\{\{[^{}\n]*?\}\}/g); } // legacy alias
  }
  return out;
}

// Replace recognized notation with equal-length spaces: checker findings
// cannot land inside it, every other offset stays exact, and word counts
// stop inflating. Used by the flattened-text collector.
function blankShortcodes(text, ranges) {
  for (const re of shortcodeRegexList()) {
    text = text.replace(re, (m, offset) => {
      if (ranges) ranges.push([offset, offset + m.length]);
      // Newlines survive the blanking so line/column geometry (Vale's
      // line numbers) is undisturbed by multi-line notation.
      return m.replace(/[^\n]/g, " ");
    });
  }
  return text;
}

// The first configured flavor's bracket pair for the given notation kind.
function notationDelims(kind) {
  const fam = scSyntaxes[0] || "hugo";
  if (fam === "liquid") {
    return kind === "variable" ? ["{{ ", " }}"] : ["{% ", " %}"];
  }
  return kind === "variable" ? ["{{ ", " }}"] : ["{{< ", " >}}"];
}

function insertNotation(kind) {
  closeMenus();
  const noun = kind === "variable" ? "Variable" : "Component";
  const inner = prompt(noun + " (the text between the brackets):", "");
  if (inner === null || !inner.trim()) return;
  const [open, close] = notationDelims(kind);
  let closer = "";
  if (kind !== "variable") {
    // Pairedness is not knowable from the opening tag (the SSG template
    // decides), so it is author-signaled: offer the flavor-correct closing
    // tag. Hugo closes {{< /name >}}; Liquid closes {% endname %} -- the
    // end-prefix morphology, not a slash.
    const name = inner.trim().split(/\s+/)[0].replace(/^\//, "");
    const fam = scSyntaxes[0] || "hugo";
    const closingTag = fam === "liquid"
      ? "{% end" + name + " %}"
      : "{{< /" + name + " >}}";
    if (name && confirm("Paired component: also insert the closing tag " + closingTag + " ?")) {
      closer = closingTag;
    }
  }
  editor.focus();
  if (lastEditorRange) {
    const sel = getSelection();
    sel.removeAllRanges();
    try { sel.addRange(lastEditorRange); } catch (e) {}
  }
  document.execCommand("insertText", false, open + inner.trim() + close + closer);
  if (closer) {
    // Land the caret between the tags (same walk-back as the $1 landing).
    const sel = getSelection();
    for (let i = 0; i < closer.length; i++) sel.modify("move", "backward", "character");
  }
  markDirty();
}

/* ---------- unsaved-changes guard ---------- */

// Returns true if it is safe to proceed with an action that replaces the
// current document (New/Open). Shows a native Save / Don't Save / Cancel
// dialog when there are unsaved changes.
async function confirmDiscard() {
  if (!dirty) return true;
  let choice;
  try {
    choice = await appConfirmDiscard();
  } catch (e) {
    flash("Dialog failed: " + e, true);
    return false; // fail safe: never silently discard
  }
  if (choice === "cancel") return false;
  if (choice === "save") {
    await doSave(false);
    return !dirty; // still dirty => user cancelled the save dialog
  }
  try { appRecoveryClear(); } catch (e) {}
  return true; // "discard"
}

/* ---------- content lifecycle ---------- */

function resetContent(html) {
  editor.innerHTML = html && html.trim() ? html : "<p><br></p>";
  // goldmark renders task-list checkboxes disabled; make them interactive.
  editor.querySelectorAll('input[type=checkbox]').forEach((cb) => {
    cb.removeAttribute("disabled");
    cb.setAttribute("contenteditable", "false");
  });
  lastEditorRange = null; // caret memory dies with the old document
  // New document contents: ALL previous marks (Harper and Vale) point at
  // dead nodes -- clear and repaint unconditionally, not only when the
  // spelling checker happens to be on (stale Vale marks used to survive
  // Reload whenever it was off).
  if (typeof valeLints !== "undefined") {
    valeLints = [];
    harperLints = [];
    paintLintOverlay();
    if (harperEnabled) scheduleHarper(300);
  }
}

/* ---------- file operations (bridged to Go) ---------- */

// File > Exit: same unsaved-changes gate as New/Open (Save / Don't Save /
// Cancel; explicit discard clears the recovery snapshot), then terminate.
async function doExit() {
  closeMenus();
  if (!(await confirmDiscard())) return;
  try { await appQuit(); } catch (e) { flash("Exit failed: " + e, true); }
}

async function doNew() {
  if (!(await confirmDiscard())) return;
  resetContent("");
  currentPath = "";
  currentFront = "";
  docNotes = [];
  paintNotes();
  markClean();
  flash("New document");
  editor.focus();
}

async function doOpen() {
  if (!(await confirmDiscard())) return;
  try {
    const doc = await appOpen();
    if (!doc) return; // dialog cancelled
    resetContent(doc.html);
    currentPath = doc.path;
    currentFront = doc.front || "";
    markClean();
    loadNotes();
    flash("Opened");
  } catch (e) {
    flash("Open failed: " + e, true);
  }
  editor.focus();
}

async function doSave(saveAs) {
  try {
    const hadPath = !!currentPath;
    const path = await appSave(editor.innerHTML, saveAs ? "" : currentPath, currentFront);
    if (!path) return; // dialog cancelled
    currentPath = path;
    markClean();
    if (!hadPath && docNotes.length) persistNotes(); // untitled notes land now
    flash("\u2713 Saved " + path, "success");
  } catch (e) {
    flash("Save failed: " + e, true);
  }
  editor.focus();
}

// Reload the current file from disk. Deliberately does NOT pass through
// confirmDiscard: the requirement is to re-read the source even with unsaved
// changes, and the button/tooltip states that it discards them.
async function doReload() {
  if (!currentPath) { flash("No file to reload", true); return; }
  try {
    const doc = await appLoad(currentPath);
    resetContent(doc.html);
    currentFront = doc.front || "";
    try { appRecoveryClear(); } catch (e) {}
    markClean();
    loadNotes();
    flash("\u21bb Reloaded from " + doc.path, "success");
  } catch (e) {
    flash("Reload failed: " + e, true);
  }
  editor.focus();
}

/* ---------- autosave / crash recovery ---------- */

// Every 30s, if the document is dirty and has changed since the last
// snapshot, ship it to the recovery file. Failures are silently ignored
// (retried next interval): autosave must never disturb editing.
const AUTOSAVE_MS = 30000;
let autosaveSig = "";
async function autosaveNow() {
  if (!dirty) return;
  const sig = currentPath + "\u0000" + currentFront + "\u0000" + editor.innerHTML;
  if (sig === autosaveSig) return;
  try {
    await appAutosave(editor.innerHTML, currentFront, currentPath);
    autosaveSig = sig;
  } catch (e) { /* best-effort */ }
}
setInterval(autosaveNow, AUTOSAVE_MS);

/* ---------- wiring ---------- */

editor.addEventListener("input", markDirty);

// Paste as plain text so foreign markup can't leak into the document model.
// Inside a code block, insertText would split the pre at every newline, so
// multi-line pastes go in as a raw text node instead: one block, verbatim.
editor.addEventListener("paste", (ev) => {
  ev.preventDefault();
  const text = (ev.clipboardData || window.clipboardData).getData("text/plain");
  const n = anchorElement();
  const pre = n && n.closest("pre");
  if (pre && editor.contains(pre)) {
    insertRawTextAtCaret(text.replace(/\r\n?/g, "\n"));
    markDirty();
    return;
  }
  document.execCommand("insertText", false, text);
});

document.getElementById("file-new").addEventListener("click", doNew);
document.getElementById("file-open").addEventListener("click", doOpen);
document.getElementById("file-save").addEventListener("click", () => doSave(false));
document.getElementById("file-saveas").addEventListener("click", () => doSave(true));
document.getElementById("file-exit").addEventListener("click", () => doExit());
document.getElementById("btn-reload").addEventListener("click", doReload);

document.getElementById("btn-quote").addEventListener("click", () => setBlock("blockquote"));
document.getElementById("btn-codeblock").addEventListener("click", insertCodeBlock);
document.getElementById("btn-hr").addEventListener("click", () => exec("insertHorizontalRule"));
document.getElementById("btn-task").addEventListener("click", insertTaskList);
document.getElementById("btn-code").addEventListener("click", toggleInlineCode);
document.getElementById("btn-link").addEventListener("click", insertLink);
document.getElementById("btn-insert").addEventListener("click", (ev) => {
  ev.stopPropagation();
  toggleMenu(insertMenu);
});
document.getElementById("insert-image").addEventListener("click", insertImage);
document.getElementById("insert-shortcode").addEventListener("click", () => insertNotation("shortcode"));
document.getElementById("insert-variable").addEventListener("click", () => insertNotation("variable"));
document.getElementById("btn-table").addEventListener("click", tableInsert);
document.getElementById("btn-row-add").addEventListener("click", tableRowAdd);
document.getElementById("btn-row-del").addEventListener("click", tableRowDel);
document.getElementById("btn-col-add").addEventListener("click", tableColAdd);
document.getElementById("btn-col-del").addEventListener("click", tableColDel);

document.querySelectorAll("#toolbar [data-cmd]").forEach((b) =>
  b.addEventListener("click", () => exec(b.dataset.cmd)));

blockSelect.addEventListener("change", () => setBlock(blockSelect.value));

// Keep the block dropdown and table buttons in sync with the caret position,
// and remember the last in-editor selection so dialogs (e.g. Special
// Characters) can insert at the position the cursor last occupied even
// after focus has moved to toolbar or dialog controls.
document.addEventListener("selectionchange", () => {
  const n = anchorElement();
  if (!n) return;
  const selNow = getSelection();
  if (selNow.rangeCount) lastEditorRange = selNow.getRangeAt(0).cloneRange();
  // Container blocks take precedence over the leaf blocks they wrap:
  // goldmark renders "> text" as <blockquote><p>...</p></blockquote>, and
  // the nearest-ancestor match would truthfully-but-unhelpfully report
  // the inner Paragraph. Pre outranks blockquote (a code block quoted
  // inside a blockquote still edits as code).
  const container = n.closest("pre, blockquote");
  const blk = container || n.closest("h1,h2,h3,h4,h5,h6,p");
  blockSelect.value = blk ? blk.tagName.toLowerCase() : "p";
  const inTable = !!n.closest("td,th");
  document.querySelectorAll(".table-op").forEach((b) => (b.disabled = !inTable));
});

document.addEventListener("keydown", (ev) => {
  if (ev.key === "Enter" && !ev.ctrlKey && !ev.metaKey) {
    const n = anchorElement();
    const pre = n && n.closest("pre");
    if (pre && editor.contains(pre)) {
      ev.preventDefault();
      codeBlockEnter(pre);
      return;
    }
  }
  if (ev.key === "Escape") {
    if (!modalBackdrop.hidden) { closeModal(); ev.preventDefault(); }
    else if (!helpMenu.hidden || !fileMenu.hidden || !toolsMenu.hidden || !insertMenu.hidden) { closeMenus(); ev.preventDefault(); }
    else if (!findbar.hidden) { closeFind(); ev.preventDefault(); }
    return;
  }
  if (ev.key === "F3") {
    ev.preventDefault();
    if (findbar.hidden) openFind();
    else gotoMatch(findIndex + (ev.shiftKey ? -1 : 1));
    return;
  }
  if (ev.key === "F1") {
    ev.preventDefault();
    showShortcuts();
    return;
  }
  if (!(ev.ctrlKey || ev.metaKey)) return;
  const k = ev.key.toLowerCase();
  let handled = true;
  if (k === "s" && ev.shiftKey)      doSave(true);
  else if (k === "s")                doSave(false);
  else if (k === "o")                doOpen();
  else if (k === "n")                doNew();
  else if (k === "r")                doReload(); // also blocks WebKit page reload
  else if (k === "f")                openFind();
  else if (k === "b")                exec("bold");
  else if (k === "i")                exec("italic");
  else if (k === "x" && ev.shiftKey) exec("strikeThrough");
  else if (k === "z" && ev.shiftKey) doUndoRedo("redo");
  else if (k === "z")                doUndoRedo("undo");
  else if (k === "y")                doUndoRedo("redo");
  else if (k === "e")                toggleInlineCode();
  else if (k === "k")                insertLink();
  else if (k === "0")                setBlock("p");
  else if (["1","2","3"].includes(k)) setBlock("h" + k); // Tufte ceiling: h3
  else handled = false;
  if (handled) ev.preventDefault();
});

/* ---------- startup ---------- */

(async function init() {
  resetContent("");
  refreshStatus();
  try {
    // Recovery first: restored content is UNSAVED work and outranks the
    // normal startup load (including a command-line file argument).
    const rec = await appRecoveryResolve();
    if (rec) {
      resetContent(rec.html);
      currentPath = rec.path || "";
      currentFront = rec.front || "";
      dirty = true;              // restored means not yet on disk
      refreshStatus();
      loadNotes();
      flash("Recovered unsaved changes \u2014 remember to Save", "success");
      editor.focus();
      return;
    }
  } catch (e) { /* recovery is best-effort; fall through to normal load */ }
  try {
    const doc = await appInit();
    if (doc) {
      resetContent(doc.html);
      currentPath = doc.path;
      currentFront = doc.front || "";
      markClean();
      loadNotes();
    }
  } catch (e) {
    flash(String(e), true);
  }
  editor.focus();
})();
</script>
<script type="module">
/* Harper bridge: loads the vendored ES modules (which SetHtml pages cannot;
   hence the loopback asset server on the Go side). Exposes a single factory
   on window and signals readiness; the classic script above owns all state. */
try {
  const mod = await import("/assets/harper/index.js");
  const bin = await import("/assets/harper/binary.js");
  window.HarperBridge = {
    create: async () => {
      let linter;
      try {
        linter = new mod.WorkerLinter({ binary: bin.binary });
        await linter.setup();
      } catch (e) {
        // Blob module workers can be restricted; fall back to main thread.
        linter = new mod.LocalLinter({ binary: bin.binary });
        await linter.setup();
      }
      return linter;
    }
  };
} catch (e) {
  window.HarperBridge = { error: "vendored harper.js not found" };
}
window.dispatchEvent(new Event("harper-bridge-ready"));
</script>
